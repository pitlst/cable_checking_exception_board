<!DOCTYPE html>
<html lang="zh-CN" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校线异常分析 - 城轨数据中台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#C70019', bg: '#131313', s_low: '#1B1B1B', s_high: '#2A2A2A', s_highest: '#333333', s_lowest: '#0E0E0E', on_s: '#E2E2E2' }, fontFamily: { display: ['"Space Grotesk"', 'sans-serif'], body: ['Inter', 'sans-serif'] } } } }
    </script>
    <style>
        body {
            background-color: #131313;
            color: #E2E2E2;
        }

        /* Glassmorphism for floating telemetry panels */
        .glass-panel {
            background: rgba(53, 53, 53, 0.4);
            backdrop-filter: blur(30px);
        }

        /* Ambient Shadow for hover */
        .hover-ambient:hover {
            box-shadow: 0 0 40px rgba(226, 226, 226, 0.06);
        }

        /* Flatpickr Customization for The Kinetic Command Theme */

    </style>
</head>

<body class="font-body antialiased min-h-screen flex flex-col selection:bg-primary selection:text-white">

    <nav
        class="flex items-center justify-between px-6 py-4 bg-s_low border-b-0 sticky top-0 z-50 shadow-[0_4px_30px_rgba(0,0,0,0.5)]">
        <div class="flex items-center space-x-3">
            <div class="w-8 h-8 bg-s_high flex items-center justify-center rounded-lg">
                <svg class="w-5 h-5 text-on_s" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M4 4a2 2 0 012-2h8a2 2 0 012 2v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path>
                </svg>
            </div>
            <span class="font-display font-bold text-lg text-white tracking-wide">城轨数据中台</span>
        </div>
        <div class="flex space-x-8 text-sm font-medium">
            <a href="#" class="text-white border-b-2 border-primary pb-1 font-bold">看板</a>
            <a href="#" class="text-on_s hover:text-white transition-colors">异常原因占比</a>
            <a href="#" class="text-on_s hover:text-white transition-colors">明细</a>
        </div>
    </nav>

    <main class="p-8 max-w-[1920px] mx-auto space-y-8 w-full">
        <!-- Header -->
        <div>
            <h1 class="font-display text-[2.5rem] font-bold text-white mb-2 tracking-tight">校线异常分析</h1>
            <p class="text-sm text-on_s/70">时间筛选按照校线异常发起单创建时间计算，数据后台任务定时刷新，最近更新时间：正在获取...</p>
        </div>

        <!-- Section 1 -->
        <section id="ongoing">
            <h2 class="font-display text-xl text-white mb-4">正在进行的流程</h2>
            <!-- 引入 HTMX 定时轮询：每 60 秒自动从后端获取最新统计数据并刷新卡片 -->
            <div class="grid grid-cols-1 md:grid-cols-5 gap-4" id="ongoing-cards" hx-get="/api/ongoing-stats"
                hx-trigger="every 60s"></div>
        </section>

        <!-- Section 2 -->
        <section class="bg-s_low p-6 rounded-xl shadow-[0_10px_30px_rgba(0,0,0,0.5)]">
            <h2 class="font-display text-lg text-white mb-4">相关单据列表</h2>
            <!-- 引入 HTMX：点击不同 Tab 时从后端获取对应 HTML 片段并替换 #document-list 内容 -->
            <div class="flex space-x-6 border-b border-s_high mb-4" hx-target="#document-list" hx-swap="innerHTML">
                <button hx-get="/api/documents?status=special"
                    class="pb-2 text-primary font-bold border-b-2 border-primary text-sm">需要关注的特殊单据</button>
                <button hx-get="/api/documents?status=responding"
                    class="pb-2 text-on_s hover:text-white transition-colors text-sm">响应中单据</button>
                <button hx-get="/api/documents?status=diagnosing"
                    class="pb-2 text-on_s hover:text-white transition-colors text-sm">一次诊断中单据</button>
            </div>
            <div id="document-list">
                <div class="grid grid-cols-3 text-sm text-on_s/60 mb-2 px-4 py-2 bg-s_highest font-medium">
                    <div>单据编码</div>
                    <div>类型</div>
                    <div>原因</div>
                </div>
                <div
                    class="grid grid-cols-3 text-sm text-white px-4 py-3 bg-s_lowest mb-1 hover:bg-s_high transition-colors cursor-pointer rounded-lg">
                    <div class="font-display">ATT 2025001</div>
                    <div><span
                            class="px-2 py-1 bg-primary text-white text-[0.6875rem] rounded-md shadow-[inset_0_0_8px_rgba(255,255,255,0.2)]">重要且紧急</span>
                    </div>
                    <div class="truncate text-on_s/80">系统核心模块出现严重性能下降，影响用户体验</div>
                </div>
                <div
                    class="grid grid-cols-3 text-sm text-white px-4 py-3 bg-s_lowest hover:bg-s_high transition-colors cursor-pointer rounded-lg">
                    <div class="font-display">ATT 2025002</div>
                    <div><span class="px-2 py-1 bg-[#494646] text-white text-[0.6875rem] rounded-md">重要不紧急</span></div>
                    <div class="truncate text-on_s/80">数据库索引优化建议，长期影响系统稳定性</div>
                </div>
            </div>
        </section>

        <!-- Section 3 -->
        <section id="completed">
            <div class="flex justify-between items-end mb-4">
                <h2 class="font-display text-xl text-white">已经完成的流程</h2>
                <!-- 引入 HTMX：时间筛选表单提交，带参数刷新已完成流程卡片 -->
                <form class="flex items-center space-x-2" hx-get="/api/completed-stats" hx-target="#completed-cards">
                    <div class="text-[0.6875rem] text-on_s/60 flex flex-col"><span>选择数据查询起始时间</span>
                        <input type="text" name="start_time" value="2025-09-01 00:00" placeholder="请选择时间"
                            class="datetime-picker bg-s_lowest text-sm px-3 py-1.5 text-white mt-1 border-b-2 border-transparent focus-within:border-primary outline-none rounded-md cursor-pointer w-40">
                    </div>
                    <span class="text-on_s mt-4">~</span>
                    <div class="text-[0.6875rem] text-on_s/60 flex flex-col"><span>选择数据查询结束时间</span>
                        <input type="text" name="end_time" value="2025-09-13 00:00" placeholder="请选择时间"
                            class="datetime-picker bg-s_lowest text-sm px-3 py-1.5 text-white mt-1 border-b-2 border-transparent focus-within:border-primary outline-none rounded-md cursor-pointer w-40">
                    </div>
                    <button type="submit"
                        class="mt-4 ml-2 px-4 py-1.5 bg-s_high hover:bg-primary transition-colors text-white text-sm border border-transparent hover:border-primary/50 rounded-md">查询</button>
                </form>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-5 gap-4" id="completed-cards"></div>
        </section>

        <!-- Section 4 -->
        <section class="bg-s_low p-6 rounded-xl shadow-[0_10px_30px_rgba(0,0,0,0.5)]">
            <h2 class="font-display text-lg text-white mb-4">流程及时率统计</h2>
            <!-- 引入 HTMX：点击不同阶段，获取并重绘对应图表 -->
            <div class="flex space-x-6 mb-6" hx-target="#charts-data" hx-swap="innerHTML">
                <button hx-get="/api/timeliness?type=response" class="text-primary font-bold text-sm">响应</button>
                <button hx-get="/api/timeliness?type=diag1"
                    class="text-on_s hover:text-white transition-colors text-sm">一次诊断</button>
                <button hx-get="/api/timeliness?type=diag2"
                    class="text-on_s hover:text-white transition-colors text-sm">二次诊断</button>
            </div>
            <div id="charts-data" class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div>
                    <h3 class="text-sm text-on_s mb-2 font-medium">班组分录</h3>
                    <div id="chart-team" class="h-80 w-full bg-s_lowest p-4 rounded-xl"></div>
                </div>
                <div>
                    <h3 class="text-sm text-on_s mb-2 font-medium">项目分录</h3>
                    <div id="chart-project" class="h-80 w-full bg-s_lowest p-4 rounded-xl"></div>
                </div>
            </div>
        </section>

        <!-- Section 5 -->
        <section class="grid grid-cols-1 lg:grid-cols-3 gap-4" id="pie-charts"></section>
    </main>

    <script>
        // Flatpickr Initialization
        flatpickr(".datetime-picker", {
            enableTime: true,
            dateFormat: "Y-m-d H:i",
            time_24hr: true,
            locale: "zh"
        });

        // Component Generator
        const createCards = (id, data) => {
            document.getElementById(id).innerHTML = data.map(d => `
    <div class="bg-s_low p-6 rounded-xl flex flex-col justify-between hover:bg-s_high transition-colors hover-ambient group cursor-pointer border-t-2 border-transparent hover:border-primary">
      <div class="flex justify-between items-start mb-6">
        <span class="text-base text-white font-medium">${d.title}</span>
        <span class="text-[0.6875rem] px-2 py-0.5 rounded-md ${d.tagClass}">${d.tag}</span>
      </div>
      <div class="font-display text-[2.5rem] leading-none text-white mb-6 group-hover:text-primary transition-colors">${d.value}</div>
      <div>
        <div class="text-[0.6875rem] text-on_s/60 mb-1">${d.subTitle}</div>
        <div class="text-sm text-white">${d.subValue}</div>
      </div>
    </div>`).join('');
        };

        createCards('ongoing-cards', [
            { title: '响应中', tag: '用时较长', tagClass: 'bg-primary/10 text-primary border border-primary/20', value: '8', subTitle: '流程平均用时 / 流程要求时限', subValue: '21小时55分钟 / 2小时' },
            { title: '一次诊断中', tag: '用时良好', tagClass: 'bg-green-500/10 text-green-400 border border-green-500/20', value: '8', subTitle: '流程平均用时 / 流程要求时限', subValue: '1小时55分钟 / 2小时' },
            { title: '二次诊断中', tag: '用时较长', tagClass: 'bg-primary/10 text-primary border border-primary/20', value: '8', subTitle: '流程平均用时 / 流程要求时限', subValue: '21小时55分钟 / 2小时' },
            { title: '整改中', tag: '用时较长', tagClass: 'bg-primary/10 text-primary border border-primary/20', value: '8', subTitle: '流程平均用时 / 流程要求时限', subValue: '21小时55分钟 / 2小时' },
            { title: '验收中', tag: '用时较长', tagClass: 'bg-primary/10 text-primary border border-primary/20', value: '8', subTitle: '流程平均用时 / 流程要求时限', subValue: '21小时55分钟 / 2小时' }
        ]);

        createCards('completed-cards', [
            { title: '响应及时率', tag: '及时率不达标', tagClass: 'bg-primary/10 text-primary border border-primary/20', value: '20%', subTitle: '及时流程数 / 总流程数 / 达标标准', subValue: '20 / 100 / 80%' },
            { title: '一次诊断及时率', tag: '及时率良好', tagClass: 'bg-green-500/10 text-green-400 border border-green-500/20', value: '90%', subTitle: '及时流程数 / 总流程数 / 达标标准', subValue: '90 / 100 / 80%' },
            { title: '二次诊断及时率', tag: '及时率不达标', tagClass: 'bg-primary/10 text-primary border border-primary/20', value: '20%', subTitle: '及时流程数 / 总流程数 / 达标标准', subValue: '20 / 100 / 80%' },
            { title: '整改及时率', tag: '及时率不达标', tagClass: 'bg-primary/10 text-primary border border-primary/20', value: '20%', subTitle: '及时流程数 / 总流程数 / 达标标准', subValue: '20 / 100 / 80%' },
            { title: '验收及时率', tag: '及时率不达标', tagClass: 'bg-primary/10 text-primary border border-primary/20', value: '20%', subTitle: '及时流程数 / 总流程数 / 达标标准', subValue: '20 / 100 / 80%' }
        ]);

        // ECharts Initialization
        const initBar = (id) => {
            const chart = echarts.init(document.getElementById(id));
            chart.setOption({
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' }, backgroundColor: 'rgba(27, 27, 27, 0.9)', borderColor: '#333', textStyle: { color: '#E2E2E2' } },
                legend: { data: ['及时数', '超时数', '及时率'], textStyle: { color: '#E2E2E2' }, bottom: 0 },
                grid: { left: '3%', right: '4%', bottom: '12%', top: '5%', containLabel: true },
                xAxis: [
                    { type: 'value', splitLine: { show: true, lineStyle: { color: '#2A2A2A', type: 'dashed' } }, axisLabel: { color: '#E2E2E2' } },
                    { type: 'value', max: 100, splitLine: { show: false }, axisLabel: { formatter: '{value}%', color: '#E2E2E2' } }
                ],
                yAxis: { type: 'category', data: ['内装一工位', '质量保证组', '电工四工位', '电工三工位', '现场部分组'], axisLabel: { color: '#E2E2E2' }, axisLine: { lineStyle: { color: '#333' } }, axisTick: { show: false } },
                series: [
                    { name: '及时数', type: 'bar', stack: 'total', itemStyle: { color: '#3B82F6' }, data: [1200, 1900, 400, 1000, 750] },
                    { name: '超时数', type: 'bar', stack: 'total', itemStyle: { color: '#6EE7B7' }, data: [800, 100, 1600, 1000, 1250] },
                    { name: '及时率', type: 'line', xAxisIndex: 1, symbolSize: 8, itemStyle: { color: '#FBBF24' }, data: [60, 95, 20, 50, 37.5] }
                ]
            });
            window.addEventListener('resize', () => chart.resize());
        };

        setTimeout(() => {
            initBar('chart-team');
            initBar('chart-project');
        }, 100);

        // Pie Charts
        const renderPieCards = () => {
            const html = [1, 2, 3].map(i => `
    <div class="bg-s_low p-6 rounded-xl shadow-[0_10px_30px_rgba(0,0,0,0.5)]">
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-display text-base text-white">异常构型组成</h3>
            <svg class="w-4 h-4 text-on_s/60 hover:text-white cursor-pointer" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
        </div>
        <div id="pie-${i}" class="h-56 w-full mb-6"></div>
        <div class="space-y-4">
        ${[
                    { name: '线号', val: '27 / 32.93%', pct: '32.93%', color: '#3B82F6' },
                    { name: '终端', val: '26 / 31.71%', pct: '31.71%', color: '#2563EB' },
                    { name: '电缆', val: '14 / 17.07%', pct: '17.07%', color: '#1D4ED8' },
                    { name: '插芯', val: '11 / 13.41%', pct: '13.41%', color: '#1E40AF' }].map(v => `
                <div>
                    <div class="flex justify-between text-[0.6875rem] text-white mb-1 font-medium">
                        <span>${v.name}</span><span>${v.val}</span>
                    </div>
                    <div class="h-1 bg-s_highest w-full overflow-hidden rounded-full">
                    <div class="h-full transition-all duration-1000 rounded-full" style="width:${v.pct}; background-color:${v.color}"></div>
                    </div>
                </div>
        `).join('')}
      </div>
    </div>
  `).join('');
            document.getElementById('pie-charts').innerHTML = html;

            [1, 2, 3].forEach(i => {
                const chart = echarts.init(document.getElementById(`pie-${i}`));
                chart.setOption({
                    tooltip: { trigger: 'item', backgroundColor: 'rgba(27, 27, 27, 0.9)', textStyle: { color: '#E2E2E2' }, borderColor: '#333' },
                    series: [{
                        type: 'pie',
                        radius: ['45%', '75%'],
                        itemStyle: { borderRadius: 6, borderColor: '#1B1B1B', borderWidth: 3 },
                        label: { color: '#E2E2E2', formatter: '{b}\n{c}' },
                        labelLine: { lineStyle: { color: '#555' } },
                        data: [
                            { value: 27, name: '线号', itemStyle: { color: '#60A5FA' } },
                            { value: 26, name: '终端', itemStyle: { color: '#3B82F6' } },
                            { value: 14, name: '电缆', itemStyle: { color: '#2563EB' } },
                            { value: 11, name: '插芯', itemStyle: { color: '#1D4ED8' } },
                            { value: 2, name: '绝缘体', itemStyle: { color: '#1E3A8A' } }
                        ]
                    }]
                });
                window.addEventListener('resize', () => chart.resize());
            });
        };

        setTimeout(renderPieCards, 100);
    </script>
</body>

</html>
